model:
  # Common parameters for all model types
  role: "standard" # "standard" or "ensemble"
  type: "UNO"
  input_size: 16384  # Used for validation, UNO processes full sequence
  output_size: 16384  # Used for validation, UNO processes full sequence
  in_channels: 3

  # UNO specific parameters
  hidden_channels: 256  # Initial width of the UNO
  lifting_channels: 256  # Hidden channels in the lifting block
  projection_channels: 256  # Hidden channels in the projection block
  positional_embedding: "grid"  # "grid" or null - adds positional encoding
  n_layers: 4  # Number of Fourier layers (U-Net style: encoder + decoder)

  # UNO layer-wise configuration (must all be same length as n_layers)
  # For a 5-layer UNO: layers 0-1 are encoder (downsample), layer 2 is bottleneck, layers 3-4 are decoder (upsample)
  uno_out_channels: [[32, 32, 32, 32]]  # Output channels for each layer
  uno_n_modes: [[[32], [16], [16], [32]]]  # Fourier modes per layer (1D, so single value per layer)
  uno_scalings: [[[1.0], [0.25], [0.25], [16.0]]]  # Resolution scaling factors per layer

  # Skip connections (default: symmetric U-Net skips)
  horizontal_skips_map: {3: 0, 2: 1}  # null uses default: {4: 0, 3: 1} for 5 layers
  horizontal_skip: "soft-gating"  # Type of horizontal skip connections

  # Channel MLP and activation
  channel_mlp_dropout: 0.1
  channel_mlp_expansion: 0.5
  non_linearity: "gelu"  # Activation function

  # Normalization and architecture
  norm: null  # Normalization layer (null, "instance", "group", etc.)
  preactivation: false 
  fno_skip: "linear"  # Skip connections within FNO blocks
  channel_mlp_skip: "linear"

  # Spectral convolution options
  separable: false  # Use depthwise separable spectral convolutions
  factorization: 'tucker'  # Tensor factorization: null, "tucker", "cp", "tt"
  rank: 0.05  # Rank for tensor factorization
  fixed_rank_modes: false
  implementation: "factorized"  # "factorized" or "reconstructed"
  decomposition_kwargs: null

  # Domain padding
  domain_padding: null  # Percentage of padding (null or float)
  domain_padding_mode: "one-sided"  # "one-sided" or "symmetric"

  # Optional incremental modes
  incremental_n_modes: null

training:
  max_epochs: 500
  warmup_epochs: 10
  batch_size: 128
  optimizer: "Adam"  # Options: "Adam", "SGD", "Muon"
  momentum: 0.9 # Unused if optimizer is not SGD
  weight_decay: 1e-4 # Unused if optimizer is not Adam
  learning_rate: 1e-3
  eta_min: 1e-6
  accelerator: "gpu"
  devices: 1
  use_logging: true
  wandb_project: "self-interferometry"
  experiment_name: "uno_vel_target"
  checkpoint_dir: "./analysis/checkpoints"
  target: "velocity"  # "velocity" or "displacement" - what the model predicts

loss:
  dynamic: false # enable dynamic loss weighting, overrides weights below
  velocity_loss_weight: 1.0
  displacement_loss_weight: 0.1

data:
  data_dir: "./analysis/data"
  dataset_file: "train5000.h5"
  split_ratios: [80, 10, 10]  # train, val, test percentages
  split_seed: 42
  num_workers: 7
  channel_dropout: 0.0  # chance of dropping a channel during training
