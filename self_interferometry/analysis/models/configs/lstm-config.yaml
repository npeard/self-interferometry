model:
  type: "LSTM"
  sequence_length: 16384
  in_channels: 3
  hidden_size: 64
  num_layers: 2
  dropout: 0.1
  bidirectional: false  # set true for non-causal (acausal) inference

training:
  max_epochs: 200
  warmup_epochs: 0
  T_0: 200  # Initial restart period (epochs for first cosine cycle)
  T_mult: 1  # Factor to increase T_i after each restart (1 = constant period, 2 = doubling)
  batch_size: 64
  optimizer: "Muon"  # Options: "Adam", "SGD", "Muon"
  weight_decay: 1e-6
  momentum: 0.9  # Unused if optimizer is not SGD
  learning_rate: 1e-2
  eta_min: 1e-6
  accelerator: "gpu"
  devices: 1
  use_logging: true
  wandb_project: "self-interferometry"
  experiment_name: "lstm_setup"
  checkpoint_dir: "./analysis/checkpoints"
  target: "velocity"  # "velocity" or "displacement" - what the model predicts

loss:
  dynamic: false  # enable dynamic loss weighting, overrides weights below
  velocity_loss_weight: 1.0
  displacement_loss_weight: [0.0, 0.1]

data:
  data_dir: "./analysis/data"
  dataset_file: ["free-space-synchro_10k.h5", "mmfiber-synchro_10k.h5"]
  split_ratios: [[80, 10, 10]]  # train, val, test percentages
  num_workers: 7
