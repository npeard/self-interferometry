model:
  type: "TCN"
  sequence_length: 16384
  activation: "GELU"
  use_layer_norm: true
  use_weight_norm: true
  dropout: 0.05
  # in_channels is derived from synthetic.wavelengths_nm
  # TCN specific parameters
  kernel_size: 3
  temporal_channels: [[16, 16, 32, 32, 64, 64]]
  dilation_base: 2

training:
  max_epochs: 200
  warmup_epochs: 5
  T_0: 200
  T_mult: 1
  batch_size: 128
  optimizer: "Adam"
  weight_decay: 1e-6
  momentum: 0.9
  learning_rate: 1e-3
  eta_min: 1e-6
  accelerator: "cpu"
  devices: 1
  use_logging: false
  wandb_project: "self-interferometry"
  experiment_name: "synthetic_tcn"
  target: "velocity"

loss:
  dynamic: false
  velocity_loss_weight: 1.0
  displacement_loss_weight: 0.1

data:
  data_dir: "./analysis/data"
  dataset_file: "unused"  # not used in synthetic mode
  split_ratios: [[80, 10, 10]]
  num_workers: 0

synthetic:
  use_synthetic_training: true
  wavelengths_nm: [[635, 674.8, 515]]
  start_freq: 1
  end_freq: 1000
  steps_per_epoch: 1000
  val_steps: 200
  max_displacement_um: 5.0
